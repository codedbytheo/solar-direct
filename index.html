<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0" />
        <!-- favicon link -->
        <link
            rel="apple-touch-icon"
            sizes="180x180"
            href="./assets/favicon/apple-touch-icon.png" />
        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="./assets/favicon/favicon-32x32.png" />
        <link
            rel="icon"
            type="image/png"
            sizes="16x16"
            href="./assets/favicon/favicon-16x16.png" />
        <link
            rel="manifest"
            href="./assets/favicon/site.webmanifest" />
        <!-- primary meta tags -->
        <title>Solar-Direct | Solar Solutions for the Western Cape</title>
        <meta
            name="title"
            content="Solar-Direct | Solar Solutions for the Western Cape" />
        <meta
            name="description"
            content="Solar-Direct is a solar solutions company situated in the Western Cape. They offer a wide range of solar panels, inverters, and batteries to meet the needs of any home or business. Their services are backed with a satisfaction guarantee." />
        <!-- facebook meta tags -->
        <meta
            property="og:type"
            content="website" />
        <meta
            property="og:url"
            content="https://solar-direct.co.za/" />
        <meta
            property="og:title"
            content="Solar-Direct | Solar Solutions for the Western Cape" />
        <meta
            property="og:description"
            content="Solar-Direct is a solar solutions company situated in the Western Cape. They offer a wide range of solar panels, inverters, and batteries to meet the needs of any home or business. Their services are backed with a satisfaction guarantee." />
        <!-- css link -->
        <link
            rel="stylesheet"
            href="./assets/css/style.css" />
        <!-- ion-icons library -->
        <script
            type="module"
            src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
        <script
            nomodule
            src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    </head>
    <body>
        <nav class="navContainer">
            <div class="mobileNav">
                <div class="navLogoHolder">
                    <img
                        src="./assets/images/solarDirectLogo.webp"
                        alt="Solar-Direct's company logo." />
                </div>
                <div class="navNavigationHolder">
                    <a
                        href="#"
                        id="navMenu"
                        ><ion-icon name="open-outline"></ion-icon
                    ></a>
                </div>
            </div>

            <div class="mobileMenu">
                <ul class="menuList">
                    <li
                        class="listItemHolder"
                        id="email">
                        <a
                            href="#"
                            class="listItem"
                            >Submit an email form</a
                        ><ion-icon name="mail-outline"></ion-icon>
                    </li>
                    <li
                        class="listItemHolder"
                        id="whatsapp">
                        <a
                            href="#"
                            class="listItem"
                            >WhatsApp us directly</a
                        ><ion-icon name="logo-whatsapp"></ion-icon>
                    </li>
                </ul>
            </div>
        </nav>

        <!-- js link -->
        <script src="./assets/js/app.js"></script>
    </body>
</html>
